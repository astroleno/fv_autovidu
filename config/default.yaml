# fv_autovidu 默认配置
# 详见 docs/vidu/i2v.md
#
# 与 Web / CLI 共用的视频生成参数契约（见 docs/自动化流水线计划）：
# - mode: first_frame | first_last_frame | reference
# - model / resolution / duration / reference_asset_ids（CLI 用命令行覆盖）

# 默认视频模式（CLI 与文档一致；Web 端由用户选择）
video:
  mode: "first_last_frame"  # 首尾帧约束视频，技术实现走 Vidu reference2video 双图
  # reference 模式默认仅使用 shot.assets 中的资产图（是否混入 firstFrame 见产品待确认）

vidu:
  # API 端点（图生视频）
  api_url: "https://api.vidu.cn/ent/v2/img2video"
  # 模型选择
  model: "viduq3-pro"  # 720p pro
  # 视频时长（秒）
  duration: 5
  # 分辨率
  resolution: "720p"
  # 音视频直出：音效+人声，不要 BGM
  audio: true
  # 仅人声，不含额外环境音效（与 Vidu audio_type=speech_only 一致）
  audio_type: "speech_only"  # all=音效+人声 speech_only=仅人声 sound_effect_only=仅音效
  bgm: false
  # 错峰模式（更省积分，48小时内完成）
  off_peak: false

# 分镜包路径（相对项目根目录）
paths:
  shot_base: "public/img/shot"
  output_frames: "output/frames"
  output_videos: "output/videos"

# 默认分镜包名称
default_episode: "第2集_EP02_分镜包"

# 剪映草稿导出（画布档位等；路径探测以运行时为准）
jianying:
  draft_path: ""
  canvas_size: "720p"

# ElevenLabs 配音（API Key 使用环境变量 ELEVENLABS_API_KEY）
elevenlabs:
  base_url: "https://api.elevenlabs.io"
  sts_timeout: 120
  sts_model: "eleven_multilingual_sts_v2"
  tts_model: "eleven_multilingual_v2"
  concurrency: 2
